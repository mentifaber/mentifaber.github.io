name: Build and Deploy Website

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6     # ← Updated to v6 (Node 24)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20          # or 24 if you prefer

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build          # or whatever your build command is (e.g. hugo, vite build, etc.)

      - name: Upload artifact
        uses: actions/upload-artifact@v4   # Keep v4 for now — it still works
        with:
          name: github-pages
          path: ./dist                    # or ./public, ./build, etc. — adjust to your output folder

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
