<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mentifaber</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #050505;
      --gold: #b8964a;
      --gold-dim: #5c4a2f;
      --white: #e8e0d0;
      --muted: #3f3a35;
      --blood: #8b2a2a;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
      cursor: crosshair;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.06'/%3E%3C/svg%3E");
      opacity: 0.42;
      pointer-events: none;
      z-index: 100;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 35%, #000 95%);
      pointer-events: none;
      z-index: 99;
    }

    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 8vw;
      position: relative;
    }

    .rule {
      position: absolute;
      left: 50%;
      top: 15vh;
      bottom: 15vh;
      width: 1px;
      background: linear-gradient(to bottom, transparent, var(--gold-dim) 25%, var(--gold-dim) 75%, transparent);
      transform: translateX(-50%);
    }

    .etymology {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(9px, 1vw, 11px);
      letter-spacing: 0.35em;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-bottom: 2.2rem;
    }

    .name {
      font-size: clamp(4.2rem, 10vw, 9.2rem);
      font-weight: 300;
      font-style: italic;
      letter-spacing: -0.03em;
      line-height: 0.88;
      color: var(--white);
    }

    .name span {
      color: var(--gold);
      font-style: normal;
      font-weight: 600;
    }

    .tagline {
      margin-top: 2.2rem;
      font-size: clamp(0.95rem, 1.9vw, 1.35rem);
      font-weight: 300;
      font-style: italic;
      color: var(--muted);
      letter-spacing: 0.07em;
      max-width: 80ch;
    }

    .divider {
      margin: 3.8rem auto;
      width: clamp(70px, 9vw, 130px);
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }

    .links {
      margin-top: 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
      align-items: center;
    }

    .links a {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(9px, 1vw, 12px);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.4s ease;
    }

    .links a:hover {
      color: var(--gold);
    }

    .weaver-link {
      margin-top: 4.2rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(11.5px, 1.35vw, 14.5px);
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--blood);
      text-decoration: none;
      padding: 1rem 0;
      transition: all 0.5s ease;
      animation: pulse-red 4s infinite ease-in-out;
    }

    .weaver-link:hover {
      color: #c33;
      letter-spacing: 0.55em;
    }

    @keyframes pulse-red {
      0%, 100% { opacity: 0.72; }
      50% { opacity: 1; }
    }

    .stamp {
      position: fixed;
      bottom: 5vh;
      right: 6vw;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .year {
      position: fixed;
      top: 5vh;
      right: 6vw;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.3em;
      color: var(--gold-dim);
    }

    .cursor-glow {
      position: fixed;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(139,42,42,0.04) 0%, transparent 78%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 98;
    }
  </style>
</head>
<body>

  <div class="cursor-glow" id="glow"></div>

  <div class="container">
    <div class="rule"></div>

    <p class="etymology">mens · mentis — faber · fabri</p>

    <h1 class="name">Menti<span>faber</span></h1>

    <p class="tagline">Builder of minds. Architect of cognitive systems.</p>

    <div class="divider"></div>

    <nav class="links">
      <a href="https://github.com/mentifaber" target="_blank">GitHub</a>
      <a href="https://x.com/mentifaber" target="_blank">X</a>
      <a href="https://instagram.com/mentifaber" target="_blank">Instagram</a>
    </nav>

    <a href="weaver.html" class="weaver-link">
      ENTER THE ARCHIVE — WEAVER AWAITS
    </a>
  </div>

  <div class="year">MMXXVI</div>
  <div class="stamp">This is the archive.</div>

  <script>
    const glow = document.getElementById('glow');
    document.addEventListener('mousemove', e => {
      glow.style.left = e.clientX + 'px';
      glow.style.top = e.clientY + 'px';
    });
  </script>

</body>
</html>
