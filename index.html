<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Mentifaber — Builder of minds."/>
  <meta property="og:title" content="Mentifaber"/>
  <meta property="og:description" content="Builder of minds."/>
  <meta name="theme-color" content="#000000"/>
  <title>Mentifaber</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=Syncopate:wght@400;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
 
    :root {
      --black:      #000000;
      --gold:       #c8a96e;
      --gold-dim:   #8a7050;   /* was #4f4028 — now visible */
      --gold-label: #7a6040;   /* label text */
      --white:      #f2e6cf;
      --off:        #c4b09a;   /* was #a89880 — brighter */
      --nav:        #7a6e62;   /* was #332d28 — readable */
      --ember:      #b02a1a;
      --ember-hi:   #d94030;
    }
 
    html, body {
      min-height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'EB Garamond', serif;
      /* desktop: no scroll; mobile: allow scroll if content overflows */
      overflow-x: hidden;
      overflow-y: auto;
      cursor: crosshair;
    }
 
    /* Grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.88' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.05;
      pointer-events: none;
      z-index: 100;
    }
 
    /* Vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 90% 70% at 50% 50%,
        transparent 15%, rgba(0,0,0,0.55) 60%, rgba(0,0,0,0.95) 100%);
      pointer-events: none;
      z-index: 99;
    }
 
    /* Ember floor */
    .ambient {
      position: fixed;
      bottom: -18vh;
      left: 50%;
      transform: translateX(-50%);
      width: 70vw;
      height: 45vh;
      background: radial-gradient(ellipse, rgba(176,42,26,0.09) 0%, transparent 65%);
      pointer-events: none;
      z-index: 97;
      animation: breathe 9s ease-in-out infinite;
    }
 
    @keyframes breathe {
      0%,100% { opacity: 0.6; }
      50%      { opacity: 1;   }
    }
 
    /* ── Layout ── */
    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      /* generous side padding that collapses on mobile */
      padding: clamp(5rem, 10vh, 8rem) clamp(1.5rem, 12vw, 14vw);
      position: relative;
    }
 
    /* Decorative horizontal rules — hidden on small screens */
    .rule-h {
      position: absolute;
      top: 13vh;
      left: 50%;
      transform: translateX(-50%);
      width: clamp(80px, 18vw, 220px);
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
    }
 
    .rule-h-bottom {
      position: absolute;
      bottom: 13vh;
      left: 50%;
      transform: translateX(-50%);
      width: clamp(50px, 9vw, 120px);
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
      opacity: 0.45;
    }
 
    /* ── Typography ── */
 
    /* Label — was nearly invisible, now solid */
    .label {
      font-family: 'Syncopate', sans-serif;
      /* floor raised: 10px min so it's always legible on phone */
      font-size: clamp(10px, 1.1vw, 12px);
      letter-spacing: 0.45em;
      color: var(--gold-label);
      text-transform: uppercase;
      margin-bottom: clamp(1.8rem, 4vh, 3rem);
      opacity: 0;
      animation: fadeUp 1s 0.1s forwards ease-out;
    }
 
    /* Logotype */
    .name {
      font-family: 'Playfair Display', serif;
      /* scales from 3.8rem on narrow phone up to 12.5rem on wide desktop */
      font-size: clamp(3.8rem, 14vw, 12.5rem);
      font-weight: 700;
      font-style: italic;
      letter-spacing: -0.03em;
      line-height: 0.82;
      color: var(--white);
      opacity: 0;
      animation: fadeUp 1.1s 0.38s forwards ease-out;
    }
 
    .name span {
      font-style: normal;
      font-weight: 900;
      color: var(--gold);
    }
 
    /* Tagline */
    .tagline {
      margin-top: clamp(1.6rem, 3.5vh, 3rem);
      font-family: 'EB Garamond', serif;
      font-size: clamp(1.05rem, 2vw, 1.3rem);
      font-style: italic;
      color: var(--off);
      letter-spacing: 0.12em;
      opacity: 0;
      animation: fadeUp 1s 0.65s forwards ease-out;
    }
 
    /* Divider */
    .divider {
      margin: clamp(2.8rem, 5.5vh, 4.8rem) auto clamp(2.4rem, 4.5vh, 4.2rem);
      width: clamp(44px, 6vw, 90px);
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      opacity: 0;
      animation: fadeIn 1s 0.9s forwards ease-out;
    }
 
    /* Nav links — horizontal, wraps gracefully on narrow */
    .links {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      gap: clamp(1.4rem, 3.5vw, 4rem);
      align-items: center;
      opacity: 0;
      animation: fadeUp 1s 1.1s forwards ease-out;
    }
 
    .links a {
      font-family: 'Syncopate', sans-serif;
      /* floor was 7px — raised to 11px so it's always readable */
      font-size: clamp(11px, 1.1vw, 13px);
      letter-spacing: 0.38em;
      text-transform: uppercase;
      /* was --muted (#332d28) — now --nav (#7a6e62): clearly visible */
      color: var(--nav);
      text-decoration: none;
      position: relative;
      transition: color 0.38s ease;
    }
 
    .links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--gold);
      transition: width 0.36s ease;
    }
 
    .links a:hover { color: var(--gold); }
    .links a:hover::after { width: 100%; }
 
    /* Dot separator — hidden when links wrap */
    .sep {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--gold-dim);
      flex-shrink: 0;
    }
 
    /* ── ENTER THE ARCHIVE ── */
    .weaver-link {
      margin-top: clamp(3.2rem, 6vh, 5.5rem);
      font-family: 'Syncopate', sans-serif;
      font-size: clamp(11px, 1.2vw, 14px);
      font-weight: 700;
      letter-spacing: 0.52em;
      text-transform: uppercase;
      color: var(--ember);
      text-decoration: none;
      display: inline-block;
      padding: 1rem 0;
      position: relative;
      opacity: 0;
      animation:
        fadeUp 1s 1.35s both ease-out,
        ember-pulse 4.5s 2.6s infinite ease-in-out;
      transition: color 0.5s ease, letter-spacing 0.5s ease;
    }
 
    /* Radial glow behind text */
    .weaver-link::before {
      content: '';
      position: absolute;
      inset: -10px -24px;
      border-radius: 4px;
      background: radial-gradient(ellipse 80% 60% at 50% 50%,
        rgba(176,42,26,0.2) 0%, transparent 70%);
      animation: glow-breathe 4.5s 2.6s infinite ease-in-out;
      z-index: -1;
      pointer-events: none;
    }
 
    .weaver-link:hover {
      color: var(--ember-hi);
      letter-spacing: 0.7em;
    }
 
    @keyframes ember-pulse {
      0%,100% {
        opacity: 0.55;
        text-shadow: none;
      }
      50% {
        opacity: 1;
        text-shadow:
          0 0 6px  rgba(176,42,26,0.85),
          0 0 22px rgba(176,42,26,0.45),
          0 0 52px rgba(176,42,26,0.2);
      }
    }
 
    @keyframes glow-breathe {
      0%,100% { opacity: 0.12; }
      50%      { opacity: 0.85; }
    }
 
    /* ── Entrance ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
 
    /* ── Corner labels — desktop only ── */
    .corner {
      position: fixed;
      font-family: 'Syncopate', sans-serif;
      font-size: clamp(8px, 0.85vw, 10px);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeIn 1s 2.3s forwards;
    }
 
    .stamp     { bottom: 5vh; right: 5vw; color: var(--nav); }
    .year      { top: 5vh;    right: 5vw; color: var(--gold-dim); }
    .corner-tl { top: 5vh;    left: 5vw;  color: var(--nav); }
 
    /* Cursor glow */
    .cursor-glow {
      position: fixed;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(176,42,26,0.055) 0%, transparent 65%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 98;
    }
 
    /* ── Mobile ── */
    @media (max-width: 600px) {
      /* Hide decorative rules that clip weirdly */
      .rule-h, .rule-h-bottom { display: none; }
 
      /* Hide fixed corners — they overlap content */
      .corner { display: none; }
 
      /* Disable cursor glow on touch */
      .cursor-glow { display: none; }
 
      /* Dots between links look odd when wrapping — hide */
      .sep { display: none; }
 
      .container {
        padding: 4rem 1.8rem 4rem;
        min-height: 100svh;
      }
 
      .links {
        gap: 1.6rem 2rem;
      }
 
      .weaver-link {
        /* Tighter letter-spacing so it fits on narrow screens */
        letter-spacing: 0.32em;
        font-size: 11px;
      }
    }
 
    /* Tall narrow (phone landscape edge case) */
    @media (max-width: 420px) {
      .name {
        font-size: clamp(3.2rem, 17vw, 4.5rem);
      }
    }
  </style>
</head>
<body>
 
  <div class="cursor-glow" id="glow"></div>
  <div class="ambient"></div>
 
  <div class="container">
    <div class="rule-h"></div>
    <div class="rule-h-bottom"></div>
 
    <p class="label">mens · mentis &nbsp;—&nbsp; faber · fabri</p>
 
    <h1 class="name">Menti<span>faber</span></h1>
 
    <p class="tagline">Builder of minds.</p>
 
    <div class="divider"></div>
 
    <nav class="links">
      <a href="https://github.com/mentifaber" target="_blank" rel="noopener">GitHub</a>
      <span class="sep"></span>
      <a href="https://x.com/mentifaber" target="_blank" rel="noopener">X</a>
      <span class="sep"></span>
      <a href="https://instagram.com/mentifaber" target="_blank" rel="noopener">Instagram</a>
    </nav>
 
    <a href="weaver.html" class="weaver-link">Enter the Archive</a>
  </div>
 
  <div class="corner stamp">The archive.</div>
  <div class="corner year">MMXXVI</div>
  <div class="corner corner-tl">Mentifaber</div>
 
  <script>
    const glow = document.getElementById('glow');
    let cx = window.innerWidth / 2, cy = window.innerHeight / 2;
    let tx = cx, ty = cy;
    const isTouchDevice = window.matchMedia('(hover: none)').matches;
    if (!isTouchDevice) {
      document.addEventListener('mousemove', e => { tx = e.clientX; ty = e.clientY; });
      (function loop() {
        cx += (tx - cx) * 0.09;
        cy += (ty - cy) * 0.09;
        glow.style.left = cx + 'px';
        glow.style.top  = cy + 'px';
        requestAnimationFrame(loop);
      })();
    }
  </script>
 
</body>
</html>
