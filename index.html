<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Mentifaber — Builder of minds. Architect of cognitive systems."/>
  <meta property="og:title" content="Mentifaber"/>
  <meta property="og:description" content="Builder of minds. Architect of cognitive systems."/>
  <meta name="theme-color" content="#030303"/>
  <title>Mentifaber</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,600&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black:    #030303;
      --gold:     #d4b17f;
      --gold-dim: #6b5a3f;
      --gold-mid: #a8874d;
      --white:    #f0e6d2;
      --muted:    #4a4238;
      --blood:    #9c2f2f;
      --blood-hi: #c94a4a;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
      cursor: crosshair;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.82' numOctaves='6' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.45'/%3E%3C/svg%3E");
      opacity: 0.38;
      pointer-events: none;
      z-index: 100;
    }

    /* Vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 25%, rgba(0,0,0,0.7) 80%, #000 100%);
      pointer-events: none;
      z-index: 99;
    }

    /* Subtle ambient glow from bottom */
    .ambient {
      position: fixed;
      bottom: -20vh;
      left: 50%;
      transform: translateX(-50%);
      width: 70vw;
      height: 50vh;
      background: radial-gradient(ellipse, rgba(156,47,47,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 97;
    }

    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 12vw;
      position: relative;
    }

    /* Top horizontal rule */
    .rule-h {
      position: absolute;
      top: 14vh;
      left: 50%;
      transform: translateX(-50%);
      width: clamp(120px, 20vw, 240px);
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
      opacity: 0.6;
    }

    /* Bottom horizontal rule */
    .rule-h-bottom {
      position: absolute;
      bottom: 14vh;
      left: 50%;
      transform: translateX(-50%);
      width: clamp(80px, 12vw, 160px);
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dim), transparent);
      opacity: 0.4;
    }

    /* Etymology / label */
    .etymology {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(9px, 1vw, 11px);
      letter-spacing: 0.5em;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-bottom: 2.6rem;
      opacity: 0;
      animation: fadeUp 1.1s 0.2s forwards ease-out;
    }

    /* Main logotype */
    .name {
      font-size: clamp(5rem, 12vw, 11rem);
      font-weight: 300;
      font-style: italic;
      letter-spacing: -0.04em;
      line-height: 0.82;
      color: var(--white);
      opacity: 0;
      animation: fadeUp 1s 0.5s forwards ease-out;
      position: relative;
    }

    .name span {
      color: var(--gold);
      font-style: normal;
      font-weight: 600;
    }

    /* Tagline */
    .tagline {
      margin-top: 2.6rem;
      font-size: clamp(1rem, 1.8vw, 1.42rem);
      font-weight: 300;
      font-style: italic;
      color: var(--muted);
      letter-spacing: 0.1em;
      max-width: 70ch;
      opacity: 0;
      animation: fadeUp 1s 0.8s forwards ease-out;
    }

    /* Divider */
    .divider {
      margin: 4.2rem auto 3.8rem;
      width: clamp(60px, 8vw, 120px);
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      opacity: 0;
      animation: fadeIn 1s 1.1s forwards ease-out;
    }

    /* Nav links */
    .links {
      display: flex;
      flex-direction: row;
      gap: clamp(2rem, 4vw, 5rem);
      align-items: center;
      opacity: 0;
      animation: fadeUp 1s 1.3s forwards ease-out;
    }

    .links a {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(9px, 1vw, 11.5px);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      position: relative;
      transition: color 0.45s ease;
    }

    .links a::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--gold);
      transition: width 0.4s ease;
    }

    .links a:hover { color: var(--gold); }
    .links a:hover::after { width: 100%; }

    /* Dot separator between links */
    .links .sep {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--gold-dim);
      opacity: 0.5;
    }

    /* Weaver CTA */
    .weaver-link {
      margin-top: 5rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(11px, 1.3vw, 14px);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--blood);
      text-decoration: none;
      padding: 1rem 0;
      display: inline-block;
      position: relative;
      transition: color 0.6s ease, letter-spacing 0.6s ease;
      animation: pulse-red 5s infinite ease-in-out, fadeUp 1s 1.6s both ease-out;
    }

    .weaver-link::before {
      content: '◈';
      margin-right: 1.2em;
      font-size: 0.75em;
      opacity: 0.7;
      transition: opacity 0.4s;
    }

    .weaver-link::after {
      content: '◈';
      margin-left: 1.2em;
      font-size: 0.75em;
      opacity: 0.7;
      transition: opacity 0.4s;
    }

    .weaver-link:hover {
      color: var(--blood-hi);
      letter-spacing: 0.65em;
    }

    .weaver-link:hover::before,
    .weaver-link:hover::after { opacity: 1; }

    @keyframes pulse-red {
      0%, 100% { opacity: 0.65; }
      50% { opacity: 1; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* Corner fixtures */
    .stamp {
      position: fixed;
      bottom: 5.5vh;
      right: 6.5vw;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: fadeIn 1.2s 2s forwards;
    }

    .year {
      position: fixed;
      top: 5.5vh;
      right: 6.5vw;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.35em;
      color: var(--gold-dim);
      opacity: 0;
      animation: fadeIn 1.2s 2s forwards;
    }

    .corner-tl {
      position: fixed;
      top: 5.5vh;
      left: 6.5vw;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.35em;
      color: var(--muted);
      opacity: 0;
      animation: fadeIn 1.2s 2s forwards;
    }

    /* Cursor glow */
    .cursor-glow {
      position: fixed;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(156,47,47,0.055) 0%, transparent 72%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 98;
      transition: left 0.08s ease-out, top 0.08s ease-out;
    }
  </style>
</head>
<body>

  <div class="cursor-glow" id="glow"></div>
  <div class="ambient"></div>

  <div class="container">
    <div class="rule-h"></div>
    <div class="rule-h-bottom"></div>

    <p class="etymology">mens · mentis &nbsp;—&nbsp; faber · fabri</p>

    <h1 class="name">Menti<span>faber</span></h1>

    <p class="tagline">Builder of minds. Architect of cognitive systems.</p>

    <div class="divider"></div>

    <nav class="links">
      <a href="https://github.com/mentifaber" target="_blank" rel="noopener">GitHub</a>
      <span class="sep"></span>
      <a href="https://x.com/mentifaber" target="_blank" rel="noopener">X</a>
      <span class="sep"></span>
      <a href="https://instagram.com/mentifaber" target="_blank" rel="noopener">Instagram</a>
    </nav>

    <a href="weaver.html" class="weaver-link">Enter the Archive — Weaver Awaits</a>
  </div>

  <div class="year">MMXXVI</div>
  <div class="stamp">This is the archive.</div>
  <div class="corner-tl">Mentifaber</div>

  <script>
    const glow = document.getElementById('glow');
    let cx = window.innerWidth / 2, cy = window.innerHeight / 2;
    let tx = cx, ty = cy;

    document.addEventListener('mousemove', e => {
      tx = e.clientX;
      ty = e.clientY;
    });

    (function loop() {
      cx += (tx - cx) * 0.1;
      cy += (ty - cy) * 0.1;
      glow.style.left = cx + 'px';
      glow.style.top  = cy + 'px';
      requestAnimationFrame(loop);
    })();
  </script>

</body>
</html>
