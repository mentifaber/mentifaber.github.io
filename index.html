<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mentifaber</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #030303;
      --gold: #d4b17f;
      --gold-dim: #6b5a3f;
      --white: #f0e6d2;
      --muted: #4a4238;
      --blood: #9c2f2f;
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--white);
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden;
      cursor: crosshair;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.82' numOctaves='6' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.45'/%3E%3C/svg%3E");
      opacity: 0.45;
      pointer-events: none;
      z-index: 100;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, #000 92%);
      pointer-events: none;
      z-index: 99;
    }

    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 10vw;
      position: relative;
    }

    .etymology {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(9.5px, 1.05vw, 11.5px);
      letter-spacing: 0.4em;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-bottom: 2.4rem;
    }

    .name {
      font-size: clamp(4.8rem, 11vw, 10rem);
      font-weight: 300;
      font-style: italic;
      letter-spacing: -0.035em;
      line-height: 0.85;
      color: var(--white);
    }

    .name span {
      color: var(--gold);
      font-style: normal;
      font-weight: 600;
    }

    .tagline {
      margin-top: 2.4rem;
      font-size: clamp(1rem, 2vw, 1.45rem);
      font-weight: 300;
      font-style: italic;
      color: var(--muted);
      letter-spacing: 0.08em;
      max-width: 78ch;
    }

    .divider {
      margin: 4rem auto 3.5rem;
      width: clamp(80px, 10vw, 140px);
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }

    .links {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.15rem;
      align-items: center;
    }

    .links a {
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(9.5px, 1.05vw, 12.5px);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.5s ease;
    }

    .links a:hover { color: var(--gold); }

    .weaver-link {
      margin-top: 4.5rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(12px, 1.4vw, 15px);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--blood);
      text-decoration: none;
      padding: 1.1rem 0;
      transition: all 0.6s ease;
      animation: pulse-red 5s infinite ease-in-out;
    }

    .weaver-link:hover {
      color: #c94a4a;
      letter-spacing: 0.6em;
    }

    @keyframes pulse-red {
      0%, 100% { opacity: 0.68; }
      50% { opacity: 1; }
    }

    .stamp {
      position: fixed;
      bottom: 5.5vh;
      right: 6.5vw;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .year {
      position: fixed;
      top: 5.5vh;
      right: 6.5vw;
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.35em;
      color: var(--gold-dim);
    }

    .cursor-glow {
      position: fixed;
      width: 380px;
      height: 380px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(156,47,47,0.045) 0%, transparent 80%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 98;
    }
  </style>
</head>
<body>

  <div class="cursor-glow" id="glow"></div>

  <div class="container">
    <p class="etymology">mens · mentis — faber · fabri</p>

    <h1 class="name">Menti<span>faber</span></h1>

    <p class="tagline">Builder of minds. Architect of cognitive systems.</p>

    <div class="divider"></div>

    <nav class="links">
      <a href="https://github.com/mentifaber" target="_blank">GitHub</a>
      <a href="https://x.com/mentifaber" target="_blank">X</a>
      <a href="https://instagram.com/mentifaber" target="_blank">Instagram</a>
    </nav>

    <a href="weaver.html" class="weaver-link">
      ENTER THE ARCHIVE — WEAVER AWAITS
    </a>
  </div>

  <div class="year">MMXXVI</div>
  <div class="stamp">This is the archive.</div>

  <script>
    const glow = document.getElementById('glow');
    document.addEventListener('mousemove', e => {
      glow.style.left = e.clientX + 'px';
      glow.style.top = e.clientY + 'px';
    });
  </script>

</body>
</html>
